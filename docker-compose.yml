version: "3.8"

services:
  item-service:
    container_name: item-service
    build:
      context: ./item-service
    ports:
      - "8081:8081"
    networks:
      - microservices-net

  order-service:
    container_name: order-service
    build:
      context: ./order-service
    ports:
      - "8082:8082"
    networks:
      - microservices-net

  payment-service:
    container_name: payment-service
    build:
      context: ./payment-service
    ports:
      - "8083:8083"
    networks:
      - microservices-net

  api-gateway:
    container_name: api-gateway
    build:
      context: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - item-service
      - order-service
      - payment-service
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge
